<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>

<body>
    <table>
        <caption>Alunos</caption>
        <thread>
            <tr>
                <th>Nome</th>
                <th>Nota</th>
            </tr>
        </thread>

        <body>
            <tr>
                <td>Aluno A</td>
                <td>9.0</td>
            </tr>
            <tr>
                <td>Aluno B</td>
                <td>4.5</td>
            </tr>
        </body>
        <tfoot>
            <tr>
                <td colspan="2">Quantidade de alunos: 2</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
